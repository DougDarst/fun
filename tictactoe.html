<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef6e4;
    --card: #fff8f0;
    --x-color: #f25c54;
    --o-color: #4ecdc4;
    --line: #2d2d2d;
    --text: #2d2d2d;
    --accent: #f7b731;
    --shadow: rgba(45,45,45,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Playful background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #f0e0c8 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.5;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    gap: 20px;
    position: relative;
  }

  .title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: var(--text);
    letter-spacing: 1px;
    text-align: center;
    text-shadow: 4px 4px 0px var(--accent);
    line-height: 1;
  }

  .title span:first-child { color: var(--x-color); }
  .title span:last-child { color: var(--o-color); }

  /* Score board */
  .scoreboard {
    display: flex;
    gap: 12px;
    width: 100%;
    justify-content: center;
  }

  .score-card {
    flex: 1;
    max-width: 110px;
    background: var(--card);
    border-radius: 20px;
    padding: 14px 10px;
    text-align: center;
    border: 2.5px solid transparent;
    box-shadow: 0 4px 0 var(--shadow), 0 6px 20px var(--shadow);
    transition: all 0.3s ease;
  }

  .score-card.x-card { border-color: var(--x-color); }
  .score-card.o-card { border-color: var(--o-color); }
  .score-card.draw-card { border-color: var(--accent); }

  .score-card.active {
    transform: translateY(-4px);
    box-shadow: 0 8px 0 var(--shadow), 0 10px 24px var(--shadow);
  }

  .score-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    letter-spacing: 0.5px;
  }
  .x-card .score-label { color: var(--x-color); }
  .o-card .score-label { color: var(--o-color); }
  .draw-card .score-label { color: var(--accent); }

  .score-value {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--text);
  }

  /* Turn indicator */
  .turn-indicator {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    color: var(--text);
    text-align: center;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .turn-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .turn-dot.x { background: var(--x-color); }
  .turn-dot.o { background: var(--o-color); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  /* Board */
  .board-wrap {
    position: relative;
    width: 100%;
    max-width: 320px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    background: var(--card);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 8px 0 var(--shadow), 0 12px 40px rgba(45,45,45,0.15);
    border: 3px solid var(--text);
  }

  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    background: var(--card);
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .cell:active { background: #fdebd0; }

  /* Grid lines — bottom border on rows 1 & 2, right border on cols 1 & 2 */
  .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3),
  .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 3px solid var(--text); }

  .cell:nth-child(1), .cell:nth-child(2),
  .cell:nth-child(4), .cell:nth-child(5),
  .cell:nth-child(7), .cell:nth-child(8) { border-right: 3px solid var(--text); }

  .cell-symbol {
    width: 62%;
    height: 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell-symbol.show { transform: scale(1); }

  .cell-symbol svg {
    width: 100%;
    height: 100%;
  }

  /* Win highlight */
  .cell.winner {
    background: linear-gradient(135deg, #fff8f0, #fff0d0);
    animation: winner-flash 0.5s ease-in-out 2;
  }

  @keyframes winner-flash {
    0%, 100% { background: #fff8f0; }
    50% { background: #fff0a0; }
  }

  /* Status banner */
  .status-banner {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    text-align: center;
    color: var(--text);
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card);
    border-radius: 16px;
    padding: 10px 24px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 4px 0 var(--shadow);
    border: 2.5px solid var(--text);
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .status-banner.show {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .btn {
    flex: 1;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 14px 10px;
    border: 2.5px solid var(--text);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 0 var(--text);
    outline: none;
    letter-spacing: 0.5px;
  }

  .btn:active {
    transform: translateY(4px);
    box-shadow: none;
  }

  .btn-new { background: var(--x-color); color: white; }
  .btn-reset { background: var(--o-color); color: white; }

  /* Confetti */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 10;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">
    <span>Tic</span> Tac <span>Toe</span>
  </div>

  <div class="scoreboard">
    <div class="score-card x-card" id="x-card">
      <div class="score-label">You ✕</div>
      <div class="score-value" id="x-score">0</div>
    </div>
    <div class="score-card draw-card">
      <div class="score-label">Draws</div>
      <div class="score-value" id="draw-score">0</div>
    </div>
    <div class="score-card o-card" id="o-card">
      <div class="score-label">Her ○</div>
      <div class="score-value" id="o-score">0</div>
    </div>
  </div>

  <div class="turn-indicator" id="turn-indicator">
    <span class="turn-dot x"></span>
    <span>Your turn!</span>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">
      <!-- 9 cells -->
      <div class="cell" data-i="0"><div class="cell-symbol" id="sym-0"></div></div>
      <div class="cell" data-i="1"><div class="cell-symbol" id="sym-1"></div></div>
      <div class="cell" data-i="2"><div class="cell-symbol" id="sym-2"></div></div>
      <div class="cell" data-i="3"><div class="cell-symbol" id="sym-3"></div></div>
      <div class="cell" data-i="4"><div class="cell-symbol" id="sym-4"></div></div>
      <div class="cell" data-i="5"><div class="cell-symbol" id="sym-5"></div></div>
      <div class="cell" data-i="6"><div class="cell-symbol" id="sym-6"></div></div>
      <div class="cell" data-i="7"><div class="cell-symbol" id="sym-7"></div></div>
      <div class="cell" data-i="8"><div class="cell-symbol" id="sym-8"></div></div>
    </div>
  </div>

  <div class="status-banner" id="status-banner">🎉 Player X wins!</div>

  <div class="btn-row">
    <button class="btn btn-new" id="btn-new">New Game</button>
    <button class="btn btn-reset" id="btn-reset">Reset Scores</button>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  let scores = { X: 0, O: 0, D: 0 };

  const cells = document.querySelectorAll('.cell');
  const turnEl = document.getElementById('turn-indicator');
  const banner = document.getElementById('status-banner');
  const xScore = document.getElementById('x-score');
  const oScore = document.getElementById('o-score');
  const drawScore = document.getElementById('draw-score');
  const xCard = document.getElementById('x-card');
  const oCard = document.getElementById('o-card');

  function svgX() {
    return `<svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="10" y1="10" x2="50" y2="50" stroke="#f25c54" stroke-width="9" stroke-linecap="round"/>
      <line x1="50" y1="10" x2="10" y2="50" stroke="#f25c54" stroke-width="9" stroke-linecap="round"/>
    </svg>`;
  }

  function svgO() {
    return `<svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="30" cy="30" r="19" stroke="#4ecdc4" stroke-width="9" stroke-linecap="round"/>
    </svg>`;
  }

  function updateTurn() {
    if (gameOver) return;
    const isX = current === 'X';
    turnEl.innerHTML = `<span class="turn-dot ${isX?'x':'o'}"></span> ${isX ? "Your turn!" : "Her turn!"}`;
    xCard.classList.toggle('active', isX);
    oCard.classList.toggle('active', !isX);
  }

  function checkWin() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[b] === board[c]) {
        return [a,b,c];
      }
    }
    return null;
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    const sym = document.getElementById('sym-' + i);
    sym.innerHTML = current === 'X' ? svgX() : svgO();
    setTimeout(() => sym.classList.add('show'), 10);

    const win = checkWin();
    if (win) {
      gameOver = true;
      win.forEach(idx => cells[idx].classList.add('winner'));
      scores[current]++;
      updateScores();
      const msg = current === 'X' ? '🎉 You win!' : '🎉 She wins!';
      showBanner(msg, current === 'X' ? '#f25c54' : '#4ecdc4');
      launchConfetti();
      turnEl.innerHTML = '';
    } else if (board.every(v => v)) {
      gameOver = true;
      scores.D++;
      updateScores();
      showBanner("🤝 It's a draw!", '#f7b731');
      turnEl.innerHTML = '';
    } else {
      current = current === 'X' ? 'O' : 'X';
      updateTurn();
    }
  }

  function showBanner(msg, color) {
    banner.textContent = msg;
    banner.style.borderColor = color;
    banner.classList.add('show');
  }

  function updateScores() {
    xScore.textContent = scores.X;
    oScore.textContent = scores.O;
    drawScore.textContent = scores.D;
  }

  function newGame() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cells.forEach(c => {
      c.classList.remove('winner');
    });
    for (let i = 0; i < 9; i++) {
      const sym = document.getElementById('sym-' + i);
      sym.classList.remove('show');
      setTimeout(() => sym.innerHTML = '', 200);
    }
    banner.classList.remove('show');
    xCard.classList.remove('active');
    oCard.classList.remove('active');
    updateTurn();
  }

  function launchConfetti() {
    const colors = ['#f25c54','#4ecdc4','#f7b731','#a29bfe','#fd79a8','#55efc4'];
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = (8 + Math.random() * 8) + 'px';
      p.style.height = (8 + Math.random() * 8) + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      p.style.animationDelay = (Math.random() * 0.8) + 's';
      container.appendChild(p);
    }
    setTimeout(() => container.innerHTML = '', 4000);
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => handleClick(+cell.dataset.i));
  });

  document.getElementById('btn-new').addEventListener('click', newGame);
  document.getElementById('btn-reset').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    newGame();
  });

  updateTurn();
</script>
</body>
</html>
