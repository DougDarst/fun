<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Connect Four</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --board: #162447;
    --board-face: #1f4068;
    --hole: #1a1a2e;
    --p1: #ff6b6b;
    --p1-glow: rgba(255,107,107,0.6);
    --p2: #ffd93d;
    --p2-glow: rgba(255,217,61,0.6);
    --win-bg: rgba(255,255,255,0.08);
    --text: #e8eaf6;
    --accent: #4fc3f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 45%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,195,247,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 0% 100%, rgba(255,107,107,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(255,217,61,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 16px 24px;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  /* Title */
  .title {
    font-family: 'Boogaloo', cursive;
    font-size: 2.6rem;
    color: var(--text);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
  }
  .title .c1 { color: var(--p1); text-shadow: 0 0 20px var(--p1-glow); }
  .title .c2 { color: var(--p2); text-shadow: 0 0 20px var(--p2-glow); }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }

  .score-card {
    flex: 1;
    max-width: 130px;
    border-radius: 18px;
    padding: 12px 8px;
    text-align: center;
    border: 2px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
  }

  .score-card.p1 {
    border-color: rgba(255,107,107,0.4);
    background: rgba(255,107,107,0.08);
  }
  .score-card.p2 {
    border-color: rgba(255,217,61,0.4);
    background: rgba(255,217,61,0.08);
  }

  .score-card.active.p1 {
    border-color: var(--p1);
    background: rgba(255,107,107,0.15);
    box-shadow: 0 0 20px rgba(255,107,107,0.3), inset 0 0 20px rgba(255,107,107,0.05);
    transform: scale(1.04);
  }
  .score-card.active.p2 {
    border-color: var(--p2);
    background: rgba(255,217,61,0.15);
    box-shadow: 0 0 20px rgba(255,217,61,0.3), inset 0 0 20px rgba(255,217,61,0.05);
    transform: scale(1.04);
  }

  .score-name {
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .p1 .score-name { color: var(--p1); }
  .p2 .score-name { color: var(--p2); }

  .score-disc {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .p1 .score-disc { background: var(--p1); box-shadow: 0 0 8px var(--p1-glow); }
  .p2 .score-disc { background: var(--p2); box-shadow: 0 0 8px var(--p2-glow); }

  .score-num {
    font-family: 'Boogaloo', cursive;
    font-size: 2.2rem;
    color: var(--text);
    line-height: 1.1;
  }

  /* Turn indicator */
  .turn-bar {
    font-family: 'Boogaloo', cursive;
    font-size: 1.2rem;
    color: var(--text);
    letter-spacing: 1px;
    text-align: center;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.9;
  }

  .turn-disc {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    animation: bounce 0.8s ease-in-out infinite alternate;
  }
  .turn-disc.p1 { background: var(--p1); box-shadow: 0 0 10px var(--p1-glow); }
  .turn-disc.p2 { background: var(--p2); box-shadow: 0 0 10px var(--p2-glow); }

  @keyframes bounce {
    from { transform: translateY(-3px); }
    to { transform: translateY(3px); }
  }

  /* Drop arrow indicators */
  .arrows {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    width: 100%;
    max-width: 358px;
    gap: 4px;
    padding: 0 4px;
  }

  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 24px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .arrow svg {
    width: 16px;
    height: 16px;
  }

  .arrow.p1-arrow svg { fill: var(--p1); filter: drop-shadow(0 0 4px var(--p1-glow)); }
  .arrow.p2-arrow svg { fill: var(--p2); filter: drop-shadow(0 0 4px var(--p2-glow)); }
  .arrow.visible { opacity: 1; }

  /* Board */
  .board-outer {
    width: 100%;
    max-width: 358px;
    border-radius: 20px;
    background: var(--board);
    padding: 10px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.07),
      inset 0 -2px 0 rgba(0,0,0,0.2);
    border: 2px solid rgba(255,255,255,0.07);
    position: relative;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    background: var(--hole);
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.6), inset 0 1px 3px rgba(0,0,0,0.4);
    transition: background 0.1s;
    overflow: hidden;
  }

  /* Disc fill inside cell */
  .disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    transform: scale(0);
    transition: transform 0s; /* JS controls drop animation */
  }

  .disc.p1 {
    background: radial-gradient(circle at 35% 35%, #ff9a9a, var(--p1) 60%, #cc3333);
    box-shadow: 0 0 12px var(--p1-glow), inset 0 -3px 6px rgba(0,0,0,0.3);
  }

  .disc.p2 {
    background: radial-gradient(circle at 35% 35%, #ffe88a, var(--p2) 60%, #cc9900);
    box-shadow: 0 0 12px var(--p2-glow), inset 0 -3px 6px rgba(0,0,0,0.3);
  }

  .disc.placed {
    transform: scale(1);
  }

  .disc.drop {
    animation: dropIn 0.35s cubic-bezier(0.55, 0, 1, 0.45) forwards;
  }

  @keyframes dropIn {
    0% { transform: scale(1) translateY(var(--drop-from)); }
    70% { transform: scale(1) translateY(4px); }
    85% { transform: scale(1) translateY(-2px); }
    100% { transform: scale(1) translateY(0); }
  }

  /* Win highlight */
  .disc.winner {
    animation: winner-pulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes winner-pulse {
    from { box-shadow: 0 0 8px currentColor; filter: brightness(1); }
    to { box-shadow: 0 0 24px currentColor, 0 0 48px currentColor; filter: brightness(1.3); }
  }

  .disc.p1.winner { color: var(--p1); }
  .disc.p2.winner { color: var(--p2); }

  /* Status banner */
  .status-banner {
    font-family: 'Boogaloo', cursive;
    font-size: 1.6rem;
    color: var(--text);
    text-align: center;
    padding: 12px 28px;
    border-radius: 18px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    width: 100%;
    max-width: 358px;
    letter-spacing: 1px;
    opacity: 0;
    transform: scale(0.8) translateY(10px);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .status-banner.show {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 358px;
  }

  .btn {
    flex: 1;
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    padding: 14px 10px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    outline: none;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.1s;
  }

  .btn:active::after { background: rgba(255,255,255,0.15); }
  .btn:active { transform: scale(0.96); }

  .btn-new {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,107,0.4);
  }

  .btn-reset {
    background: linear-gradient(135deg, #ffd93d, #f0a500);
    color: #1a1a2e;
    box-shadow: 0 4px 15px rgba(255,217,61,0.4);
  }

  /* Confetti */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 100;
  }

  .cp {
    position: absolute;
    top: -16px;
    border-radius: 3px;
    animation: cf linear forwards;
  }

  @keyframes cf {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(800deg) scale(0.5); opacity: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">
    <span class="c1">Connect</span> <span class="c2">Four</span>
  </div>

  <div class="scoreboard">
    <div class="score-card p1 active" id="card-p1">
      <div class="score-name"><span class="score-disc"></span> You</div>
      <div class="score-num" id="score-p1">0</div>
    </div>
    <div class="score-card p2" id="card-p2">
      <div class="score-name"><span class="score-disc"></span> Her</div>
      <div class="score-num" id="score-p2">0</div>
    </div>
  </div>

  <div class="turn-bar" id="turn-bar">
    <span class="turn-disc p1" id="turn-disc"></span>
    <span id="turn-text">Your turn!</span>
  </div>

  <div class="arrows" id="arrows">
    <!-- 7 column arrows, generated by JS -->
  </div>

  <div class="board-outer">
    <div class="board" id="board"></div>
  </div>

  <div class="status-banner" id="status-banner">🎉 You win!</div>

  <div class="btn-row">
    <button class="btn btn-new" id="btn-new">New Game</button>
    <button class="btn btn-reset" id="btn-reset">Reset Scores</button>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const ROWS = 6, COLS = 7;
let grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
let currentPlayer = 1;
let gameOver = false;
let scores = [0, 0];
let dropping = false;

const boardEl = document.getElementById('board');
const arrowsEl = document.getElementById('arrows');
const banner = document.getElementById('status-banner');
const turnBar = document.getElementById('turn-bar');
const turnDisc = document.getElementById('turn-disc');
const turnText = document.getElementById('turn-text');
const cardP1 = document.getElementById('card-p1');
const cardP2 = document.getElementById('card-p2');
const scoreP1 = document.getElementById('score-p1');
const scoreP2 = document.getElementById('score-p2');

// Build grid cells
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.row = r;
    cell.dataset.col = c;
    const disc = document.createElement('div');
    disc.className = 'disc';
    disc.id = `disc-${r}-${c}`;
    cell.appendChild(disc);
    cell.addEventListener('click', () => handleColClick(c));
    boardEl.appendChild(cell);
  }
}

// Build arrows
for (let c = 0; c < COLS; c++) {
  const arrow = document.createElement('div');
  arrow.className = 'arrow p1-arrow visible';
  arrow.dataset.col = c;
  arrow.innerHTML = `<svg viewBox="0 0 16 16"><path d="M8 2l6 8H2z"/></svg>`;
  arrow.addEventListener('click', () => handleColClick(c));
  arrowsEl.appendChild(arrow);
}

function updateArrows() {
  const cls = currentPlayer === 1 ? 'p1-arrow' : 'p2-arrow';
  document.querySelectorAll('.arrow').forEach(a => {
    a.className = 'arrow ' + cls + (gameOver ? '' : ' visible');
  });
}

function updateTurn() {
  if (gameOver) {
    turnBar.style.opacity = '0';
    return;
  }
  turnBar.style.opacity = '1';
  const isP1 = currentPlayer === 1;
  turnDisc.className = 'turn-disc ' + (isP1 ? 'p1' : 'p2');
  turnText.textContent = isP1 ? 'Your turn!' : 'Her turn!';
  cardP1.classList.toggle('active', isP1);
  cardP2.classList.toggle('active', !isP1);
  updateArrows();
}

function getDropRow(col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!grid[r][col]) return r;
  }
  return -1;
}

function handleColClick(col) {
  if (gameOver || dropping) return;
  const row = getDropRow(col);
  if (row < 0) return;

  dropping = true;
  grid[row][col] = currentPlayer;

  const disc = document.getElementById(`disc-${row}-${col}`);
  const cellHeight = disc.parentElement.offsetHeight + 6; // gap
  const dropDistance = (row + 1) * cellHeight;

  disc.className = 'disc ' + (currentPlayer === 1 ? 'p1' : 'p2');
  disc.style.setProperty('--drop-from', `-${dropDistance}px`);
  disc.classList.add('drop');

  disc.addEventListener('animationend', () => {
    disc.classList.remove('drop');
    disc.classList.add('placed');
    dropping = false;

    const winCells = checkWin(row, col);
    if (winCells) {
      gameOver = true;
      winCells.forEach(([wr, wc]) => {
        document.getElementById(`disc-${wr}-${wc}`).classList.add('winner');
      });
      scores[currentPlayer - 1]++;
      updateScores();
      const msg = currentPlayer === 1 ? '🎉 You win!' : '🎉 She wins!';
      const color = currentPlayer === 1 ? 'rgba(255,107,107,0.3)' : 'rgba(255,217,61,0.3)';
      banner.textContent = msg;
      banner.style.borderColor = currentPlayer === 1 ? 'var(--p1)' : 'var(--p2)';
      banner.style.background = color;
      banner.classList.add('show');
      updateArrows();
      turnBar.style.opacity = '0';
      launchConfetti(currentPlayer);
    } else if (grid.every(row => row.every(v => v))) {
      gameOver = true;
      banner.textContent = "🤝 It's a draw!";
      banner.style.borderColor = 'rgba(255,255,255,0.3)';
      banner.classList.add('show');
      updateArrows();
      turnBar.style.opacity = '0';
    } else {
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateTurn();
    }
  }, { once: true });
}

function checkWin(row, col) {
  const p = grid[row][col];
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let cells = [[row, col]];
    for (let s of [1, -1]) {
      let r = row + dr*s, c = col + dc*s;
      while (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r][c] === p) {
        cells.push([r, c]);
        r += dr*s; c += dc*s;
      }
    }
    if (cells.length >= 4) return cells;
  }
  return null;
}

function updateScores() {
  scoreP1.textContent = scores[0];
  scoreP2.textContent = scores[1];
}

function newGame() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  gameOver = false;
  dropping = false;
  currentPlayer = 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const disc = document.getElementById(`disc-${r}-${c}`);
      disc.className = 'disc';
      disc.style.removeProperty('--drop-from');
    }
  }
  banner.classList.remove('show');
  updateTurn();
}

function launchConfetti(player) {
  const colors = player === 1
    ? ['#ff6b6b','#ff9a9a','#ffcccc','#ff4444','#ffffff']
    : ['#ffd93d','#ffe88a','#ffcc00','#f0a500','#ffffff'];
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 10;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.borderRadius = Math.random() > 0.4 ? '50%' : '2px';
    p.style.animationDuration = (1.8 + Math.random() * 2.2) + 's';
    p.style.animationDelay = (Math.random() * 0.9) + 's';
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.innerHTML = '', 5000);
}

document.getElementById('btn-new').addEventListener('click', newGame);
document.getElementById('btn-reset').addEventListener('click', () => {
  scores = [0, 0];
  updateScores();
  newGame();
});

updateTurn();
</script>
</body>
</html>
